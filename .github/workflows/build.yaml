on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  quality_checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run markdown linter
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          globs: '**/*.md'

      - name: Run spell checker
        uses: streetsidesoftware/cspell-action@v8
        with:
          files: '**/*.{cs,md,json,yaml,yml}'
          incremental_files_only: false

      - name: Run YAML linter
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yaml

  build:
    name: Build ${{ matrix.os }}
    needs: quality_checks
    permissions:
      contents: read       # To read repository contents
      pull-requests: write # To write pull requests analysis results and artifacts

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            6.x
            10.x

      - name: Restore Tools
        run: >
          dotnet tool restore

      - name: Build Tests
        run: >
          dotnet build test/DemaConsulting.SpdxWorkflows.Tests

      - name: Run Windows Tests
        if: startsWith(matrix.os, 'windows')
        run: >
          dotnet test test/DemaConsulting.SpdxWorkflows.Tests
          --no-build
          --no-restore
          --verbosity normal
          --filter "TestCategory=AnyOS|TestCategory=Windows"

      - name: Run Linux Tests
        if: startsWith(matrix.os, 'ubuntu')
        run: >
          dotnet test test/DemaConsulting.SpdxWorkflows.Tests
          --no-build
          --no-restore
          --verbosity normal
          --filter "TestCategory=AnyOS|TestCategory=Linux"

      - name: Create Dotnet Tool
        run: |
          cd pack
          dotnet pack DemaConsulting.SpdxWorkflows.csproj -p:Version=${{ inputs.version }} -o .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            pack/*.nupkg

      - name: Capture tool versions
        shell: bash
        run: |
          echo "Capturing tool versions..."
          OS_SHORT=$(echo "${{ matrix.os }}" | sed 's/windows-latest/win/;s/ubuntu-latest/ubuntu/')
          JOB_ID="build-${OS_SHORT}"
          dotnet versionmark --capture --job-id "${JOB_ID}" -- \
            dotnet git versionmark
          echo "✓ Tool versions captured"

      - name: Upload version capture
        uses: actions/upload-artifact@v7
        with:
          name: version-capture-${{ matrix.os }}
          path: versionmark-build-*.json

  # Builds the documentation for the project using pandoc and weasyprint.
  build-docs:
    name: Build Docs
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Tools
        run: >
          dotnet tool restore

      - name: Install Node Packages
        run: >
          npm install

      - name: Download version captures
        uses: actions/download-artifact@v8
        with:
          pattern: version-capture-*
          path: version-captures
          merge-multiple: true

      - name: Generate Build Notes with BuildMark
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          dotnet buildmark
          --build-version ${{ inputs.version }}
          --report docs/buildnotes.md
          --report-depth 1

      - name: Display Build Notes Report
        shell: bash
        run: |
          echo "=== Build Notes Report ==="
          cat docs/buildnotes.md

      - name: Publish Tool Versions
        shell: bash
        run: |
          echo "Publishing tool versions..."
          dotnet versionmark --publish --report docs/buildnotes/versions.md --report-depth 1 \
            -- "versionmark-*.json" "version-captures/**/versionmark-*.json"
          echo "✓ Tool versions published"

      - name: Display Tool Versions Report
        shell: bash
        run: |
          echo "=== Tool Versions Report ==="
          cat docs/buildnotes/versions.md

      - name: Generate Build Notes HTML with Pandoc
        shell: bash
        run: >
          dotnet pandoc
          --defaults docs/buildnotes/definition.yaml
          --filter node_modules/.bin/mermaid-filter
          --metadata version="${{ inputs.version }}"
          --metadata date="$(date +'%Y-%m-%d')"
          --output docs/buildnotes/buildnotes.html

      - name: Generate Guide HTML with Pandoc
        shell: bash
        run: >
          dotnet pandoc
          --defaults docs/guide/definition.yaml
          --filter node_modules/.bin/mermaid-filter
          --metadata version="${{ inputs.version }}"
          --metadata date="$(date +'%Y-%m-%d')"
          --output docs/guide/guide.html

      - name: Generate Build Notes PDF with Weasyprint
        run: >
          dotnet weasyprint
          --pdf-variant pdf/a-3u
          docs/buildnotes/buildnotes.html
          "docs/SpdxWorkflows Build Notes.pdf"

      - name: Generate Guide PDF with Weasyprint
        run: >
          dotnet weasyprint
          --pdf-variant pdf/a-3u
          docs/guide/guide.html
          "docs/SpdxWorkflows User Guide.pdf"

      - name: Upload documentation
        uses: actions/upload-artifact@v7
        with:
          name: documents
          path: |
            docs/*.pdf
            docs/buildnotes.md
