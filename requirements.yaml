---
# SpdxWorkflows Requirements
#
# This file defines the requirements for the SpdxWorkflows project.
# Each requirement is linked to one or more test cases for traceability.
#
# Enforced in CI via:
#   dotnet reqstream --requirements requirements.yaml
#                    --tests "test-results/**/*.trx"
#                    --enforce
#
# NOTE: Two workflows currently lack test coverage and are excluded from
# enforcement until tests are provided:
#   - GetIarEwArmVersion (REQ-GIV-001): requires IAR EW ARM installation
#   - EnhancePackageFromNugetSpdx (REQ-EPF-001): requires NuGet package with SPDX

sections:

  - title: Get Version Workflows
    requirements:

      - id: REQ-GDN-001
        title: >-
          The GetDotNetVersion workflow shall output the installed .NET SDK
          version as a version string.
        justification: |
          Consumers of SpdxWorkflows need to capture .NET SDK version information
          into SPDX documents to satisfy NTIA minimum elements and software supply
          chain transparency requirements. The version output must be a parseable
          version string matching the installed SDK.
        tests:
          - GetDotNetVersion_OnAnyOS_ReturnsVersion

      - id: REQ-GGV-001
        title: >-
          The GetGccVersion workflow shall output the installed GCC compiler
          version as a version string.
        justification: |
          Consumers building firmware or embedded software with GCC need to capture
          GCC version information into SPDX documents to satisfy NTIA minimum
          elements and software supply chain transparency requirements.
        tests:
          - GetGccVersion_OnLinux_ReturnsVersion

      - id: REQ-GIV-001
        title: >-
          The GetIarEwArmVersion workflow shall output the installed IAR Embedded
          Workbench for ARM version as a version string.
        justification: |
          Consumers building embedded software with IAR EW ARM need to capture
          version information into SPDX documents to satisfy NTIA minimum elements
          and software supply chain transparency requirements.
        # No test yet - requires IAR EW ARM installation in CI
        # Pending test: GetIarEwArmVersion_OnWindows_ReturnsVersion

      - id: REQ-GMV-001
        title: >-
          The GetMsBuildVersion workflow shall output the installed MSBuild
          version as a version string.
        justification: |
          Consumers building .NET or Visual Studio solutions with MSBuild need to
          capture MSBuild version information into SPDX documents to satisfy NTIA
          minimum elements and software supply chain transparency requirements.
        tests:
          - GetMsBuildVersion_OnWindows_ReturnsVersion

      - id: REQ-GNV-001
        title: >-
          The GetNugetVersion workflow shall output the installed NuGet CLI
          version as a version string.
        justification: |
          Consumers using NuGet to manage package dependencies need to capture
          NuGet version information into SPDX documents to satisfy NTIA minimum
          elements and software supply chain transparency requirements.
        tests:
          - GetNugetVersion_OnWindows_ReturnsVersion

      - id: REQ-GNP-001
        title: >-
          The GetNugetPackagePath workflow shall output the file system path to
          the specified NuGet package in the local package cache.
        justification: |
          The EnhancePackageFromNugetSpdx workflow and consumers need to locate
          NuGet packages on disk by name and version in order to read SPDX
          documents embedded within those packages.
        tests:
          - GetNugetPackagePath_WithPackageAndVersion_ReturnsPath

      - id: REQ-GVV-001
        title: >-
          The GetVsTestVersion workflow shall output the installed Visual Studio
          Test Platform (VSTest) version as a version string.
        justification: |
          Consumers using VSTest to run automated tests need to capture version
          information into SPDX documents to satisfy NTIA minimum elements and
          software supply chain transparency requirements.
        tests:
          - GetVsTestVersion_OnWindows_ReturnsVersion

  - title: Add Package Workflows
    requirements:

      - id: REQ-ADP-001
        title: >-
          The AddDotNetPackage workflow shall add a .NET SDK package entry to the
          specified SPDX document with accurate metadata including name, version,
          license, copyright, supplier, originator, and homepage.
        justification: |
          SPDX documents require accurate, consistent package metadata to satisfy
          NTIA minimum elements and software supply chain transparency standards.
          The .NET SDK metadata is fixed and well-known, sourced from Microsoft's
          published information and the dotnet/dotnet GitHub repository.
        tests:
          - AddDotNetPackage_WithValidParameters_AddsPackageToDocument

      - id: REQ-AGP-001
        title: >-
          The AddGccPackage workflow shall add a GNU Compiler Collection package
          entry to the specified SPDX document with accurate metadata including
          name, version, license, copyright, originator, homepage, and PURL.
        justification: |
          SPDX documents require accurate, consistent package metadata to satisfy
          NTIA minimum elements and software supply chain transparency standards.
          GCC metadata is publicly available from the GNU project and the
          gcc-mirror/gcc GitHub repository.
        tests:
          - AddGccPackage_WithValidParameters_AddsPackageToDocument

      - id: REQ-AIP-001
        title: >-
          The AddIarEwArmPackage workflow shall add an IAR Embedded Workbench for
          ARM package entry to the specified SPDX document with accurate metadata
          including name, version, supplier, originator, and homepage.
        justification: |
          SPDX documents require accurate, consistent package metadata to satisfy
          NTIA minimum elements and software supply chain transparency standards.
          IAR EW ARM metadata is sourced from IAR Systems' published product
          information.
        tests:
          - AddIarEwArmPackage_WithValidParameters_AddsPackageToDocument

      - id: REQ-AMP-001
        title: >-
          The AddMsBuildPackage workflow shall add a Microsoft Build Engine package
          entry to the specified SPDX document with accurate metadata including
          name, version, license, copyright, supplier, originator, homepage,
          and PURL.
        justification: |
          SPDX documents require accurate, consistent package metadata to satisfy
          NTIA minimum elements and software supply chain transparency standards.
          MSBuild metadata is publicly available from Microsoft's documentation and
          the dotnet/msbuild GitHub repository.
        tests:
          - AddMsBuildPackage_WithValidParameters_AddsPackageToDocument

      - id: REQ-ANP-001
        title: >-
          The AddNugetPackage workflow shall add a NuGet CLI package entry to the
          specified SPDX document with accurate metadata including name, version,
          license, copyright, supplier, originator, homepage, and PURL.
        justification: |
          SPDX documents require accurate, consistent package metadata to satisfy
          NTIA minimum elements and software supply chain transparency standards.
          NuGet CLI metadata is publicly available from nuget.org and the
          NuGet/NuGet.Client GitHub repository.
        tests:
          - AddNugetPackage_WithValidParameters_AddsPackageToDocument

      - id: REQ-AVP-001
        title: >-
          The AddVsTestPackage workflow shall add a Visual Studio Test Platform
          package entry to the specified SPDX document with accurate metadata
          including name, version, license, copyright, supplier, originator,
          homepage, and PURL.
        justification: |
          SPDX documents require accurate, consistent package metadata to satisfy
          NTIA minimum elements and software supply chain transparency standards.
          VSTest metadata is publicly available from Microsoft's documentation and
          the microsoft/vstest GitHub repository.
        tests:
          - AddVsTestPackage_WithValidParameters_AddsPackageToDocument

  - title: Enhance Package Workflows
    requirements:

      - id: REQ-EPF-001
        title: >-
          The EnhancePackageFromNugetSpdx workflow shall update an existing
          package entry in an SPDX document with enriched metadata copied from
          the SPDX document embedded in the corresponding NuGet package.
        justification: |
          NuGet packages often include embedded SPDX documents with comprehensive
          metadata such as license texts, checksums, and CPE identifiers that
          exceed what is manually catalogued. Enhancing packages from this embedded
          source improves SPDX document accuracy and completeness without
          requiring manual data entry.
        # No test yet - integration test requires a NuGet package with SPDX
        # embedded in the local cache. This is a complex integration scenario.
        # Pending test: EnhancePackageFromNugetSpdx_WithValidPackage_EnhancesDocument
